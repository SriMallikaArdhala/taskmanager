spring.application.name=taskmanager-backend

# PORT — Railway injects $PORT automatically. Never hardcode 8081.
server.port=${PORT:8080}

# MySQL — Railway provides these env vars when you add a MySQL service
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:taskmanager_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:taskmanager_super_secret_key_2024_minimum_256_bits_long}
app.jwt.expiration=86400000